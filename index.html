<script>
// ── Lazy library loader ──────────────────────────────────────
const _libLoaded = {};
function loadScript(src) {
  if (_libLoaded[src]) return _libLoaded[src];
  _libLoaded[src] = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
  return _libLoaded[src];
}
function loadStyle(href) {
  if (document.querySelector(`link[href="${href}"]`)) return;
  const l = document.createElement('link');
  l.rel = 'stylesheet'; l.href = href;
  document.head.appendChild(l);
}
async function ensureFabric() {
  if (window.fabric) return;
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js');
}
async function ensureMathJax() {
  if (window.MathJax && window.MathJax.typesetPromise) return;
  if (!window._mjPromise) {
    window._mjPromise = new Promise((res) => {
      window.MathJax = {
        tex: { inlineMath: [['\\(','\\)']], displayMath: [['$$','$$']] },
        startup: { typeset: false, pageReady: () => { res(); return MathJax.startup.defaultPageReady(); } }
      };
      loadScript('https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js');
    });
  }
  return window._mjPromise;
}
async function ensurePDFJS() {
  if (window.pdfjsLib) return;
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
}
async function ensureJSZip() {
  if (window.JSZip) return;
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
}
async function ensureJsPDF() {
  if (window.jspdf) return;
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
}
async function ensureChartJS() {
  if (window.Chart) return;
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js');
}
async function ensureCropper() {
  if (window.Cropper) return;
  loadStyle('https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css');
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js');
}
</script>
