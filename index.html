<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Mathrone Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --navy: #0D1B40;
      --blue: #1A5FFF;
      --blue2: #3B7BFF;
      --sky: #E8F0FF;
      --sky2: #C5D6FF;
      --gold: #F5A623;
      --white: #fff;
      --g50: #F8FAFE;
      --g100: #EEF2FA;
      --g200: #D8E0F0;
      --g400: #8A98B8;
      --g600: #4A5578;
      --g800: #1E2845;
      --green: #10B981;
      --red: #EF4444;
      --orange: #F59E0B;
      --r: 16px;
      --rs: 10px;
      --sh: 0 4px 24px rgba(13, 27, 64, .10);
      --shl: 0 8px 48px rgba(13, 27, 64, .18)
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--g50);
      color: var(--g800);
      overflow-x: hidden
    }

    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: var(--g100)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--sky2);
      border-radius: 3px
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes slideR {
      from {
        opacity: 0;
        transform: translateX(-12px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 11px 22px;
      border-radius: var(--rs);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: all .2s;
      white-space: nowrap;
      text-decoration: none
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 4px 14px rgba(26, 95, 255, .35)
    }

    .btn-primary:hover {
      background: var(--blue2);
      transform: translateY(-1px)
    }

    .btn-secondary {
      background: #fff;
      color: var(--blue);
      border: 2px solid var(--blue)
    }

    .btn-secondary:hover {
      background: var(--sky)
    }

    .btn-ghost {
      background: transparent;
      color: var(--g600);
      border: 2px solid var(--g200)
    }

    .btn-ghost:hover {
      background: var(--g100)
    }

    .btn-gold {
      background: var(--gold);
      color: var(--navy);
      box-shadow: 0 4px 14px rgba(245, 166, 35, .35)
    }

    .btn-danger {
      background: var(--red);
      color: #fff
    }

    .btn-success {
      background: var(--green);
      color: #fff
    }

    .btn-sm {
      padding: 7px 14px;
      font-size: 12px;
      border-radius: 8px
    }

    .btn-lg {
      padding: 15px 34px;
      font-size: 16px;
      border-radius: var(--r)
    }

    .btn-full {
      width: 100%;
      justify-content: center
    }

    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none !important
    }

    /* ── Cards ── */
    .card {
      background: #fff;
      border-radius: var(--r);
      box-shadow: var(--sh)
    }

    .card-hover {
      transition: all .25s;
      cursor: pointer
    }

    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: var(--shl)
    }

    /* ── Forms ── */
    .input {
      width: 100%;
      padding: 11px 15px;
      border: 2px solid var(--g200);
      border-radius: var(--rs);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--g800);
      background: #fff;
      transition: all .2s;
      outline: none
    }

    .input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26, 95, 255, .10)
    }

    .input::placeholder {
      color: var(--g400)
    }

    select.input {
      cursor: pointer
    }

    textarea.input {
      resize: vertical;
      min-height: 90px
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 16px
    }

    .form-label {
      font-weight: 600;
      font-size: 13px;
      color: var(--g600)
    }

    .form-error {
      font-size: 12px;
      color: var(--red);
      margin-top: 3px
    }

    .form-hint {
      font-size: 11px;
      color: var(--g400);
      margin-top: 2px
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700
    }

    .badge-blue {
      background: var(--sky);
      color: var(--blue)
    }

    .badge-green {
      background: #DCFCE7;
      color: #166534
    }

    .badge-orange {
      background: #FEF3C7;
      color: #92400E
    }

    .badge-red {
      background: #FEE2E2;
      color: #991B1B
    }

    .badge-gray {
      background: var(--g100);
      color: var(--g600)
    }

    .badge-navy {
      background: var(--navy);
      color: #fff
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 252px;
      background: var(--navy);
      min-height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      padding: 20px 14px;
      z-index: 50;
      overflow-y: auto;
      transition: transform .3s
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      margin-bottom: 24px;
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      border: none;
      background: none;
      font-family: 'Playfair Display', serif;
      width: 100%;
      text-align: left
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: var(--blue);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0
    }

    .sidebar-section {
      font-size: 10px;
      font-weight: 700;
      color: var(--g400);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 6px 10px 3px;
      margin-top: 10px
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px;
      border-radius: var(--rs);
      cursor: pointer;
      transition: all .2s;
      color: rgba(255, 255, 255, .6);
      font-size: 14px;
      font-weight: 500;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      margin-bottom: 2px
    }

    .sidebar-item:hover {
      background: rgba(255, 255, 255, .08);
      color: #fff
    }

    .sidebar-item.active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 4px 12px rgba(26, 95, 255, .4)
    }

    .sidebar-ic {
      font-size: 17px;
      width: 20px;
      text-align: center
    }

    .sidebar-badge {
      margin-left: auto;
      background: var(--red);
      color: #fff;
      border-radius: 10px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 700
    }

    /* ── Dashboard layout ── */
    .dash-layout {
      display: flex;
      min-height: 100vh
    }

    .dash-main {
      flex: 1;
      margin-left: 252px;
      padding: 32px 28px 60px
    }

    .page-header {
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--navy)
    }

    .page-subtitle {
      color: var(--g600);
      margin-top: 4px;
      font-size: 14px
    }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px
    }

    .stat-card {
      background: #fff;
      border-radius: var(--r);
      padding: 20px;
      box-shadow: var(--sh);
      display: flex;
      align-items: center;
      gap: 14px
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--rs);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0
    }

    .stat-num {
      font-size: 24px;
      font-weight: 800;
      color: var(--navy)
    }

    .stat-label {
      font-size: 12px;
      color: var(--g400);
      font-weight: 600;
      margin-top: 2px
    }

    .stat-delta {
      font-size: 11px;
      margin-top: 3px
    }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--r);
      box-shadow: var(--sh)
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: var(--r);
      overflow: hidden
    }

    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--g400);
      background: var(--g50);
      border-bottom: 1px solid var(--g200)
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--g100);
      font-size: 13px;
      vertical-align: middle
    }

    tr:last-child td {
      border-bottom: none
    }

    tr:hover td {
      background: var(--g50)
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 3px;
      background: var(--g100);
      border-radius: var(--rs);
      padding: 3px;
      width: fit-content;
      margin-bottom: 20px
    }

    .tab-btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      border: none;
      background: none;
      color: var(--g600);
      font-family: 'DM Sans', sans-serif
    }

    .tab-btn.active {
      background: #fff;
      color: var(--blue);
      box-shadow: var(--sh)
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13, 27, 64, .45);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fadeIn .2s
    }

    .modal {
      background: #fff;
      border-radius: var(--r);
      box-shadow: 0 20px 70px rgba(13, 27, 64, .22);
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      animation: fadeUp .3s
    }

    .modal-header {
      padding: 20px 26px;
      border-bottom: 1px solid var(--g100);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--navy)
    }

    .modal-body {
      padding: 24px 26px
    }

    .modal-footer {
      padding: 16px 26px;
      border-top: 1px solid var(--g100);
      display: flex;
      gap: 10px;
      justify-content: flex-end
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--g400);
      padding: 4px;
      border-radius: 6px
    }

    .modal-close:hover {
      background: var(--g100);
      color: var(--g800)
    }

    /* ── Toast ── */
    #toasts {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none
    }

    .toast {
      padding: 12px 18px;
      border-radius: var(--rs);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 260px;
      animation: slideR .3s;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .2);
      pointer-events: all
    }

    .toast-ok {
      background: #065f46;
      color: #fff;
      border-left: 4px solid var(--green)
    }

    .toast-err {
      background: #7f1d1d;
      color: #fff;
      border-left: 4px solid var(--red)
    }

    .toast-info {
      background: #1e3a5f;
      color: #fff;
      border-left: 4px solid var(--blue)
    }

    /* ── Spinner ── */
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--g200);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite
    }

    .loader-center {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px
    }

    /* ── Avatar ── */
    .avatar {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
      background: var(--sky);
      color: var(--blue);
      font-size: 14px
    }

    /* ── Misc ── */
    .stars {
      color: var(--gold);
      font-size: 12px;
      letter-spacing: 1px
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px
    }

    .divider {
      height: 1px;
      background: var(--g100);
      margin: 18px 0
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--g400)
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--g600);
      margin-bottom: 8px
    }

    .empty-sub {
      font-size: 14px
    }

    .progress-bar {
      width: 100%;
      height: 7px;
      background: var(--g100);
      border-radius: 4px;
      overflow: hidden
    }

    .progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 4px;
      transition: width .5s
    }

    .alert-warn {
      background: #FFFBEB;
      border: 1px solid #FDE68A;
      border-radius: var(--r);
      padding: 14px 18px;
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
      font-size: 13px;
      color: #92400E
    }

    /* ── Chat ── */
    .chat-wrap {
      display: flex;
      height: calc(100vh - 180px);
      background: #fff;
      border-radius: var(--r);
      box-shadow: var(--sh);
      overflow: hidden
    }

    .chat-list {
      width: 270px;
      border-right: 1px solid var(--g100);
      overflow-y: auto;
      flex-shrink: 0
    }

    .chat-item {
      padding: 14px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--g100);
      transition: background .2s;
      display: flex;
      align-items: center;
      gap: 11px
    }

    .chat-item:hover,
    .chat-item.active {
      background: var(--sky)
    }

    .chat-item.active {
      border-left: 3px solid var(--blue)
    }

    .chat-messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0
    }

    .msgs-area {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px
    }

    .msg {
      max-width: 68%;
      display: flex;
      flex-direction: column;
      gap: 3px
    }

    .msg.sent {
      align-self: flex-end;
      align-items: flex-end
    }

    .msg.recv {
      align-self: flex-start;
      align-items: flex-start
    }

    .msg-bubble {
      padding: 11px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.55
    }

    .msg.sent .msg-bubble {
      background: var(--blue);
      color: #fff;
      border-bottom-right-radius: 3px
    }

    .msg.recv .msg-bubble {
      background: var(--g100);
      color: var(--g800);
      border-bottom-left-radius: 3px
    }

    .msg-time {
      font-size: 10px;
      color: var(--g400)
    }

    .chat-input-row {
      padding: 14px;
      border-top: 1px solid var(--g100);
      display: flex;
      gap: 10px
    }

    /* ── Landing ── */
    .landing-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      background: #fff;
      box-shadow: 0 2px 12px rgba(13, 27, 64, .08);
      position: sticky;
      top: 0;
      z-index: 40
    }

    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      cursor: pointer;
      border: none;
      background: none;
      font-family: 'Playfair Display', serif
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .hero {
      background: linear-gradient(135deg, var(--navy) 0%, #1A3A80 60%, #1A5FFF 100%);
      padding: 80px 48px;
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 40%, rgba(26, 95, 255, .25) 0%, transparent 70%)
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, .9);
      margin-bottom: 24px;
      backdrop-filter: blur(10px)
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(38px, 6vw, 68px);
      font-weight: 900;
      color: #fff;
      line-height: 1.08;
      max-width: 800px;
      margin-bottom: 22px
    }

    .hero-title span {
      color: var(--gold)
    }

    .hero-sub {
      font-size: 18px;
      color: rgba(255, 255, 255, .75);
      max-width: 560px;
      line-height: 1.65;
      margin-bottom: 36px
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap
    }

    .hero-stats {
      display: flex;
      gap: 48px;
      margin-top: 56px;
      padding-top: 48px;
      border-top: 1px solid rgba(255, 255, 255, .15)
    }

    .hs-num {
      font-size: 30px;
      font-weight: 800;
      color: #fff
    }

    .hs-label {
      font-size: 12px;
      color: rgba(255, 255, 255, .6);
      font-weight: 600;
      margin-top: 3px
    }

    .section {
      padding: 80px 48px;
      max-width: 1200px;
      margin: 0 auto
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 12px
    }

    .section-sub {
      font-size: 16px;
      color: var(--g600);
      line-height: 1.6;
      max-width: 560px
    }

    .tutor-card {
      background: #fff;
      border-radius: var(--r);
      box-shadow: var(--sh);
      padding: 24px;
      transition: all .25s;
      cursor: pointer
    }

    .tutor-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shl)
    }

    .feature-card {
      background: #fff;
      border-radius: var(--r);
      box-shadow: var(--sh);
      padding: 28px
    }

    .feature-icon {
      width: 52px;
      height: 52px;
      border-radius: var(--rs);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 16px
    }

    /* ── Auth page ── */
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--navy), #1a3a80);
      padding: 20px
    }

    .auth-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .25);
      width: 100%;

    async function api(path, opts = {}) {
      const token = getToken()
      const h = { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) }
      const r = await fetch(API_URL + path, { ...opts, headers: { ...h, ...(opts.headers || {}) } })
      if (!r.ok) {
        const e = await r.json().catch(() => ({ detail: r.statusText }))
        throw new Error(e.detail || 'Request failed')
      }
      if (r.status === 204) return null
      return r.json()
    }

    function toast(msg, type = 'ok') {

      const el = document.createElement('div')

    async function renderPage() {
      const p = State.page
      if (p === 'landing') return renderLanding()
      if (p === 'login') return renderLogin()
      if (p === 'register') return renderRegister()
      if(p==='privacy') return renderPrivacyPolicy()
      if(p==='about') return renderAboutUs()
      if(p.startsWith('report/')) return renderParentReport(p.replace('report/',''))
      if (!State.user) return navigate('login')
      const role = State.user.role
      if (p === 'dashboard') {
        if (role === 'admin') return renderAdminDash()
        if (role === 'tutor') return renderTutorDash()
        return renderStudentDash()
      }
      if (p === 'sessions') return renderSessions()
      if (p === 'messages') return renderMessages()
      if (p === 'profile') return renderProfile()
      if (p === 'notifications') return renderNotifications()
      if (p === 'tutors') return renderTutorSearch()
      if (p === 'admin-tutors') return renderAdminTutors()

    function avi(name = '?', size = 40, url = null) {
  if(url){
    return `<img src="${url}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'"/>`
  }
  const c = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase()
  return `<div class="avi" style="width:${size}px;height:${size}px;font-size:${size * 0.35}px">${c}</div>`
}

function statusBadge(s) {
  const m = { approved: 'green', pending: 'orange', scheduled: 'blue', completed: 'green', cancelled: 'red', rejected: 'red', applicant: 'gray', under_review: 'orange', written_exam: 'blue', interview: 'blue', paid: 'green', overdue: 'red', in_progress: 'blue', suspended: 'red', tutor: 'blue', student: 'gray', admin: 'purple' }
  return `<span class="badge badge-${m[s] || 'gray'}">${s?.replace(/_/g, ' ')}</span>`
}
function stars(n) { return '★'.repeat(Math.round(n || 0)) + '☆'.repeat(5 - Math.round(n || 0)) }
function fmt(dt) { return dt ? new Date(dt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—' }
function fmtShort(dt) { return dt ? new Date(dt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—' }
    // Sidebar  // counting unread notifications for badge

    async function loadUnreadCount() {
      try {
        const notifs = await api('/notifications/?unread_only=true')
        const count = (notifs || []).length
        State.data.unreadCount = count
        // Inject badge into DOM after sidebar renders
        setTimeout(() => {
          const btns = document.querySelectorAll('.sidebar-item')
          btns.forEach(btn => {
            if (btn.textContent.includes('Notifications')) {
              const old = btn.querySelector('.notif-badge')
              if (old) old.remove()
              if (count > 0) {
                const badge = document.createElement('span')
                badge.className = 'notif-badge'
                badge.style.cssText = 'margin-left:auto;background:#ef4444;color:#fff;border-radius:999px;font-size:11px;font-weight:700;padding:1px 7px;min-width:20px;text-align:center'
                badge.textContent = count
                btn.appendChild(badge)
              }
            }
          })
        }, 100)
      } catch (e) {
        State.data.unreadCount = 0
      }
    }
    function notifBadge() {
      const count = State.data.unreadCount || 0
      if (count === 0) return ''
      return '<span style="margin-left:auto;background:#ef4444;color:#fff;border-radius:999px;font-size:11px;font-weight:700;padding:1px 7px;min-width:20px;text-align:center">' + count + '</span>'

      const start = performance.now()
      function step(now){

        const ease = 1 - Math.pow(1 - progress, 3)
        const val = isDecimal ? (ease * target).toFixed(1) : Math.round(ease * target)
        el.textContent = val + suffix
        if(progress < 1) requestAnimationFrame(step)
      }
      requestAnimationFrame(step)

    async function doForgotPassword() {
      const email = document.getElementById('fp-email')?.value?.trim()
      const btn = document.getElementById('fp-btn')
      const msg = document.getElementById('fp-msg')
      if (!email) {
        msg.style.display = 'block'
        msg.style.background = '#fee2e2'
        msg.style.color = '#dc2626'
        msg.textContent = 'Please enter your email address'
        return
      }
      btn.disabled = true
      btn.textContent = 'Sending...'
      try {
        await api('/auth/forgot-password?email=' + encodeURIComponent(email), { method: 'POST' })
        msg.style.display = 'block'
        msg.style.background = '#dcfce7'
        msg.style.color = '#16a34a'
        msg.textContent = '✅ Reset link sent! Check your email inbox.'
        btn.textContent = 'Sent!'
      } catch (e) {
        msg.style.display = 'block'
        msg.style.background = '#fee2e2'
        msg.style.color = '#dc2626'
        msg.textContent = 'Failed to send reset email. Try again.'
        btn.disabled = false
        btn.textContent = 'Send Reset Link'
      }
    }
    async function doLogin() {
      const email = document.getElementById('l-email')?.value?.trim()
      const pw = document.getElementById('l-pw')?.value
      const btn = document.getElementById('login-btn')
      const err = document.getElementById('login-err')
      if (!email || !pw) { showErr(err, 'Please enter email and password'); return }
      btn.disabled = true; btn.textContent = 'Signing in...'
      try {
        const data = await api('/auth/login', { method: 'POST', body: JSON.stringify({ email, password: pw }) })
        setAuth(data)
        toast(`Welcome back, ${data.user.full_name}! 👋`)
        navigate('dashboard')
      } catch (e) {
        showErr(err, e.message)
        btn.disabled = false; btn.textContent = 'Sign In'
      }
    }

    function showErr(el, msg) { if (el) { el.textContent = msg; el.style.display = 'block' } }

    async function doRegister() {
      const role = window._regRole
      const btn = document.getElementById('reg-btn')
      const err = document.getElementById('reg-err')
      const name = document.getElementById('r-name')?.value?.trim()
      const email = document.getElementById('r-email')?.value?.trim()
      const pw = document.getElementById('r-pw')?.value
      if (!name || !email || !pw) { showErr(err, 'Name, email and password are required'); return }
      if (pw.length < 6) { showErr(err, 'Password must be at least 6 characters'); return }

      if (role === 'tutor') {
        const cvFile = document.getElementById('r-cv')?.files[0]
        if (!cvFile) { showErr(err, 'Please upload your CV'); return }
      }

      btn.disabled = true; btn.textContent = 'Creating account...'
      try {
        let body, path
        if (role === 'student') {
          const level = document.getElementById('r-level')?.value
          if (!level) { showErr(err, 'Please select a school level'); btn.disabled = false; btn.textContent = 'Create Student Account →'; return }
          body = {
            full_name: name, email, password: pw,
            phone: document.getElementById('r-phone')?.value || null,
            school_level: level,
            subjects_needed: document.getElementById('r-subjects')?.value?.split(',').map(s => s.trim()).filter(Boolean) || [],
            preferred_mode: document.getElementById('r-mode')?.value || 'online',
            home_location: document.getElementById('r-location-s')?.value || null,
            parent_name: document.getElementById('r-parent')?.value||null,
            parent_phone: document.getElementById('r-parent-phone')?.value||null ,
            category: document.getElementById('r-student-category')?.value || 'academic',}
            path = '/auth/register/student'
            
        } else {
          const qual = document.getElementById('r-qual')?.value?.trim()
          const subs = document.getElementById('r-subjects')?.value?.split(',').map(s => s.trim()).filter(Boolean) || []
          const lvls = document.getElementById('r-levels')?.value?.split(',').map(s => s.trim()).filter(Boolean) || []
          const exp = parseInt(document.getElementById('r-exp')?.value) || 0
          if (!qual || !subs.length || !lvls.length) { showErr(err, 'Qualification, subjects and levels are required'); btn.disabled = false; btn.textContent = 'Submit Application →'; return }
          body = {
            full_name: name, email, password: pw,
            phone: document.getElementById('r-phone')?.value || null,
            qualification: qual, subjects: subs, levels: lvls,
            teaching_modes: document.getElementById('r-mode')?.value?.split(',') || ['online'],
            experience_years: exp,
            location: document.getElementById('r-location')?.value || null,
            bio: document.getElementById('r-bio')?.value || null,
            category: document.getElementById('r-category')?.value || 'academic'
          }
          path = '/auth/register/tutor'
        }

        const data = await api(path, { method: 'POST', body: JSON.stringify(body) })
        setAuth(data)

        // Upload CV after successful tutor registration
        if (role === 'tutor') {
          btn.textContent = 'Uploading CV...'
          const cvFile = document.getElementById('r-cv')?.files[0]
          const certFiles = document.getElementById('r-cert')?.files
          const formData = new FormData()
          formData.append('cv', cvFile)
          if (certFiles?.length) {
            for (const f of certFiles) formData.append('certificates', f)
          }
          try {
            const token = getToken()
            await fetch(API_URL + '/tutors/upload-docs', {
              method: 'POST',
              headers: { Authorization: `Bearer ${token}` },
              body: formData
            })
          } catch (e) {
            toast('Account created but CV upload failed. Please upload from dashboard.', 'err')
          }
        }

        toast(role === 'tutor' ? 'Application submitted! ✅' : 'Account created! Welcome 🎉')
        navigate('dashboard')
      } catch (e) {
        showErr(err, e.message)
        btn.disabled = false
        btn.textContent = role === 'student' ? 'Create Student Account →' : 'Submit Application →'
      }
    }

    async function uploadTutorDocs() {
      const cvFile = document.getElementById('cv-upload')?.files[0]
      if (!cvFile) { toast('Please select a CV file', 'err'); return }

      const formData = new FormData()
      formData.append('cv', cvFile)

      const certFiles = document.getElementById('cert-upload')?.files
      if (certFiles?.length) {
        for (const f of certFiles) formData.append('certificates', f)
      }

      try {
        const token = getToken()
        const r = await fetch(API_URL + '/tutors/upload-docs', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
          body: formData
        })
        if (!r.ok) throw new Error('Upload failed')
        toast('Documents uploaded successfully! ✅')
        renderTutorDash()
      } catch (e) {
        console.error('Dashboard error:', e)
        alert('Error: ' + e.message + '\n' + e.stack)
        render(dashWrap('dashboard', `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load dashboard</div><button class="btn btn-primary" onclick="navigate('dashboard')">Retry</button></div>`))
      }
    }
    function togglePaymentDetails(){
  const method = document.getElementById('t-pay-method')?.value
  const label  = document.getElementById('pay-details-label')
  if(!label) return
  if(method === 'bank'){
    label.textContent = 'Bank Account Number & Bank Name'
  } else if(method === 'mtn_momo'){
    label.textContent = 'MTN Mobile Money Number'
  } else if(method === 'airtel'){
    label.textContent = 'Airtel Money Number'
  } else {
    label.textContent = 'Account Details'
  }
}

async function savePaymentPreference(){

      body: JSON.stringify({ payment_method: method, payment_details: details })
    })
    toast('Payment preference saved! ✅')
  }catch(e){
    toast(e.message,'err')
  }
}

async function submitProgress(sessionId){
  const marks       = document.getElementById('prog-marks')?.value
  const feedback    = document.getElementById('prog-feedback')?.value?.trim()
  const strengths   = document.getElementById('prog-strengths')?.value?.trim()
  const improvements = document.getElementById('prog-improvements')?.value?.trim()

  if(!feedback){ toast('Please add feedback','err'); return }

  try{
    await api('/progress', {
      method: 'POST',
      body: JSON.stringify({
        session_id:   sessionId,
        marks:        marks ? parseInt(marks) : null,
        feedback:     feedback,
        strengths:    strengths||null,
        improvements: improvements||null,
      })
    })
    document.querySelector('.modal-overlay')?.remove()
    toast('Feedback submitted! ✅')
    renderSessions()
  }catch(e){
    toast(e.message,'err')
  }
}

        const upcoming = sessions.filter(s => ['scheduled', 'pending'].includes(s.status))
        const completed = sessions.filter(s => s.status === 'completed')
        const cancelled = sessions.filter(s => s.status === 'cancelled')
        const list = tab === 'upcoming' ? upcoming : tab === 'completed' ? completed : cancelled

        render(dashWrap('sessions', `
    <div class="page-header">
      <div><h1 class="page-title">My Sessions</h1><p class="page-subtitle">${sessions.length} total sessions</p></div>

    <div class="tabs">
      <button class="tab-btn ${tab === 'upcoming' ? 'active' : ''}" onclick="State.tab='upcoming';renderSessions()">Upcoming (${upcoming.length})</button>
      <button class="tab-btn ${tab === 'completed' ? 'active' : ''}" onclick="State.tab='completed';renderSessions()">Completed (${completed.length})</button>
      <button class="tab-btn ${tab === 'cancelled' ? 'active' : ''}" onclick="State.tab='cancelled';renderSessions()">Cancelled (${cancelled.length})</button>
    </div>
    ${list.length ? `
    <div style="display:flex;flex-direction:column;gap:12px">
      ${list.map(s => {
          const other = State.user.role === 'student'

          return `
        <div class="card" style="padding:20px;display:flex;align-items:center;gap:16px">
          <div style="width:52px;height:52px;background:var(--sky);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">📖</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:16px;font-weight:700;color:var(--navy)">${s.subject}</div>
            <div style="font-size:13px;color:var(--g600);margin-top:4px">with ${other} • ${s.mode}</div>
            <div style="font-size:12px;color:var(--g400);margin-top:3px">${fmt(s.scheduled_at)} • ${s.duration_mins} minutes</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
            ${statusBadge(s.status)}
            ${s.meeting_link && s.status === 'scheduled' ? `<a href="${s.meeting_link}" target="_blank" class="btn btn-primary btn-sm">Join Session →</a>` : ''}
            ${s.status === 'completed' && !s.student_rating && State.user.role === 'student' ? `<button class="btn btn-gold btn-sm" onclick="openRatingModal('${s.id}','${s.subject}')">Rate Session ⭐</button>` : ''}

            ${s.status === 'completed' && s.student_rating ? `<div class="stars">${stars(s.student_rating)}</div>` : ''}
          </div>
        </div>`}).join('')}
    </div>` : `<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">No ${tab} sessions</div><div class="empty-sub">Your sessions will appear here once scheduled by admin</div></div>`}
    <div id="modal-root"></div>
    `))
      } catch (e) { toast(e.message, 'err') }
    }

    function openRatingModal(sessionId, subject) {
      let rating = 5
      document.getElementById('modal-root').innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this)this.remove()">
    <div class="modal">
      <div class="modal-header"><span class="modal-title">Rate Session: ${subject}</span><button class="modal-close" onclick="document.querySelector('.modal-overlay').remove()">✕</button></div>

    async function submitRating(sessionId) {
      try {
        await api(`/sessions/${sessionId}/review`, { method: 'POST', body: JSON.stringify({ rating: window._rating || 5, review_text: document.getElementById('review-text')?.value || null }) })

        renderSessions()

    async function submitTutorRequest(tutorId) {
      const subject = document.getElementById('req-subject')?.value?.trim()
      const level = document.getElementById('req-level')?.value
      const mode = document.getElementById('req-mode')?.value
      const notes = document.getElementById('req-notes')?.value?.trim()

      if (!subject) { toast('Please enter a subject', 'err'); return }

      try {
        await api('/students/requests', {
          method: 'POST',
          body: JSON.stringify({
            subject: subject,
            level: level,
            mode: mode,
            notes: notes || 'Student requested this tutor specifically'
          })
        })
        document.querySelector('.modal-overlay')?.remove()
        toast('Request sent! Admin will review and assign. ✅')
      } catch (e) {
        toast(e.message, 'err')
      }
    }

          <span>📚 ${t.experience_years} yrs exp</span>
          <span>📍 ${t.teaching_modes?.join(', ') || 'Online'}</span>

async function sendNewMessage(){
  const recipientId = document.getElementById('new-msg-recipient')?.value
  const content     = document.getElementById('new-msg-content')?.value?.trim()
  if(!recipientId){ toast('Please select a recipient','err'); return }
  if(!content){ toast('Please type a message','err'); return }
  try{
    await api('/messages/send', {
      method: 'POST',
      body: JSON.stringify({ recipient_id: recipientId, content: content })
    })
    document.querySelector('.modal-overlay')?.remove()
    toast('Message sent! ✅')
    renderMessages()
  }catch(e){
    toast(e.message, 'err')
  }
}

    async function renderMessages() {
      render(dashWrap('messages', `<div class="loader-center"><div class="spinner"></div></div>`))
      try {
        const convs = await api('/messages/conversations')
        const active = State.data.activeConv || (convs[0]?.id ? convs[0] : null)
        let msgs = []
        if (active) {
          try {
            const other_id = active.participant_a === State.user.id ? active.participant_b : active.participant_a
            const res = await api(`/messages/conversations/${other_id}`)
            msgs = res.messages || []
            State.data.activeConv = active
            State.data.activeOtherId = other_id
          } catch (e) { }
        }
        render(dashWrap('messages', `
    <div class="page-header">
  <div><h1 class="page-title">Messages</h1></div>
  ${State.user.role === 'admin' ? `<button class="btn btn-primary" onclick="openNewMessageModal()">+ New Message</button>` : ''}
</div>
    <div class="chat-wrap">
      <div class="chat-list">
        <div style="padding:14px 16px;border-bottom:1px solid var(--g100)"><div style="font-weight:700;font-size:13px;color:var(--navy)">Conversations</div></div>
        ${convs.length ? convs.map(c => `
        <div class="chat-item ${active?.id === c.id ? 'active' : ''}" onclick="State.data.activeConv=JSON.parse('${JSON.stringify(c).replace(/'/g, "\\'")}');renderMessages()">
          ${avi(c.other_user?.full_name || '?', 38)}
          <div style="min-width:0">
            <div style="font-weight:600;font-size:13px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.other_user?.full_name || 'Unknown'}</div>
            <div style="font-size:11px;color:var(--g400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.last_message || 'No messages yet'}</div>
          </div>
        </div>`).join('') : `<div style="padding:24px;text-align:center;color:var(--g400);font-size:13px">No conversations yet</div>`}
      </div>
      <div class="chat-messages">
        ${active ? `
        <div style="padding:14px 18px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:11px;background:#fff">
          ${avi(active.other_user?.full_name || '?', 38)}
          <div>
            <div style="font-weight:700;font-size:14px;color:var(--navy)">${active.other_user?.full_name || '—'}</div>
            <div style="font-size:11px;color:var(--green)">● Active</div>
          </div>
        </div>
        <div class="msgs-area" id="msgs-area">
          ${msgs.length ? msgs.map(m => {
          const sent = m.sender_id === State.user.id
          return `<div class="msg ${sent ? 'sent' : 'recv'}">
              <div class="msg-bubble">${m.content}</div>
              <div class="msg-time">${fmtShort(m.created_at)}</div>
            </div>`}).join('') : `<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-title">No messages yet</div><div class="empty-sub">Send the first message!</div></div>`}
        </div>
        <div class="chat-input-row">
          <input class="input" id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}" style="flex:1"/>
          <button class="btn btn-primary" onclick="sendMsg()">Send →</button>
        </div>` : `<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-title">Select a conversation</div></div>`}
      </div>
    </div>
    <div id="modal-root"></div>
    `))
        // Scroll to bottom
        setTimeout(() => { const a = document.getElementById('msgs-area'); if (a) a.scrollTop = a.scrollHeight }, 100)
      } catch (e) { toast(e.message, 'err') }
    }

    async function sendMsg() {
      const input = document.getElementById('msg-input')
      const content = input?.value?.trim()
      const otherId = State.data.activeOtherId
      if (!content || !otherId) return
      input.value = ''
      try {
        await api('/messages/send', { method: 'POST', body: JSON.stringify({ recipient_id: otherId, content }) })
        renderMessages()
      } catch (e) { toast(e.message, 'err') }
    }

    function updateBioCount(el){
  const len = el.value.length
  document.getElementById('bio-count').textContent = len + '/500'
  const msg = document.getElementById('bio-count-msg')
  if(len < 200){
    msg.style.color = 'var(--orange)'
    msg.textContent = `Minimum 200 characters (${200 - len} more needed)`
  } else {

    async function uploadAvatar(input){
  const file = input.files[0]
  if(!file) return
  if(file.size > 2 * 1024 * 1024){ toast('Image must be under 2MB','err'); return }
  const form = new FormData()
  form.append('file', file)
  try{
    toast('Uploading...')
    const res = await fetch(API_URL + '/tutors/upload-avatar', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + getToken() },
      body: form
    })
    const data = await res.json()
    if(!res.ok) throw new Error(data.detail||'Upload failed')
    toast('Profile photo updated! ✅')
    renderProfile()
  }catch(e){
    toast(e.message,'err')
  }
}

        <thead><tr><th>Student</th><th>Subject</th><th>Level</th><th>Mode</th><th>Notes</th><th>Actions</th></tr></thead>
        <tbody>
          ${pending.map(r => `<tr>
            <td><div style="font-weight:600">${r.students?.profiles?.full_name || '—'}</div><div style="font-size:11px;color:var(--g400)">${r.students?.profiles?.email || ''}</div></td>
            <td><span class="badge badge-blue">${r.subject || '—'}</span></td>
            <td>${r.level || '—'}</td>
            <td>${r.mode || '—'}</td>
            <td style="font-size:12px;color:var(--g600)">${r.notes || '—'}</td>
            <td>
              <button class="btn btn-primary btn-sm" onclick="openRequestAssignModal('${r.id}','${r.students?.id}','${(r.students?.profiles?.full_name || '').replace(/'/g, "\\'")}',${JSON.stringify(approved).replace(/"/g, '&quot;')})">
                Assign Tutor
              </button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : `
    <div class="page-header"><div><h1 class="page-title">Tutoring Requests</h1><p class="page-subtitle">No pending requests</p></div></div>
    <div class="card" style="padding:20px;margin-bottom:32px;text-align:center;color:var(--g400)">No pending tutoring requests</div>
    `}

    <div class="page-header"><div><h1 class="page-title">Students</h1><p class="page-subtitle">${students.length} registered students</p></div></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Student</th><th>Level</th><th>Subjects</th><th>Mode</th><th>Parent</th><th>Assigned Tutor</th><th>Actions</th></tr></thead>
        <tbody>
          ${students.map(s => {
            const active = (s.assignments || []).find(a => a.is_active)
            const tutorName = active?.tutors?.profiles?.full_name
            return `<tr>
              <td>
                <div style="display:flex;align-items:center;gap:10px">
                  ${avi(s.profiles?.full_name || 'S', 34)}
                  <div>
                    <div style="font-weight:600">${s.profiles?.full_name || '—'}</div>
                    <div style="font-size:11px;color:var(--g400)">${s.profiles?.email || ''}</div>
                  </div>
                </div>
              </td>
              <td>${s.school_level || '—'}</td>
              <td>${(s.subjects_needed || []).slice(0, 2).map(sub => `<span class="badge badge-blue" style="margin-right:3px">${sub}</span>`).join('') || '—'}</td>
              <td>${s.preferred_mode || '—'}</td>
              <td>
                <div style="font-size:13px;font-weight:600">${s.parent_name || '—'}</div>
                <div style="font-size:11px;color:var(--g400)">${s.parent_phone || 'No phone'}</div>
              </td>
              <td>${tutorName ? `<span style="font-weight:600;color:var(--green)">✅ ${tutorName}</span>` : `<span style="color:var(--orange)">⚠️ Unassigned</span>`}</td>
              <td>
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                  <button class="btn ${active ? 'btn-ghost' : 'btn-primary'} btn-sm" onclick="openAssignModal('${s.id}','${(s.profiles?.full_name || '').replace(/'/g, "\\'")}',${JSON.stringify(approved).replace(/"/g, '&quot;')},${JSON.stringify(s).replace(/"/g, '&quot;')})">
                    ${active ? '🔄 Change Tutor' : 'Assign Tutor'}
                  </button>
                  <button class="btn btn-ghost btn-sm" onclick="generateReport('${s.id}','${(s.profiles?.full_name || '').replace(/'/g, "\\'")}')">📊 Report</button>
                </div>
              </td>
            </tr>`
          }).join('')}
        </tbody>
      </table>
    </div>
    <div id="modal-root"></div>
    `))
  } catch (e) { toast(e.message, 'err') }
}
    async function openRequestAssignModal(requestId, studentId, studentName, approved) {
      const modalHtml = `
  <div class="modal-overlay" onclick="if(event.target===this)this.remove()">
    <div class="modal-box" style="max-width:420px">
      <h3 style="margin-bottom:16px;color:var(--navy)">Assign Tutor to ${studentName}</h3>
      <div class="form-group">
        <label class="form-label">Select Tutor</label>
        <select class="input" id="req-tutor-select">
          <option value="">— Choose approved tutor —</option>
          ${approved.map(t => `<option value="${t.id}">${t.profiles?.full_name || 'Unknown'} — ${(t.subjects || []).join(', ')}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;gap:10px;margin-top:18px">
        <button class="btn btn-primary btn-full" onclick="submitRequestAssign('${requestId}','${studentId}')">Assign ✅</button>
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      </div>
    </div>
  </div>`
      document.getElementById('modal-root').insertAdjacentHTML('beforeend', modalHtml)
    }

    async function submitRequestAssign(requestId, studentId) {
      const tutorId = document.getElementById('req-tutor-select')?.value
      if (!tutorId) { toast('Please select a tutor', 'err'); return }
      try {
        await api(`/students/admin/requests/${requestId}/assign`, {
          method: 'PATCH',
          body: JSON.stringify({ tutor_id: tutorId })
        })
        document.querySelector('.modal-overlay')?.remove()
        toast('Tutor assigned successfully! ✅')
        renderAdminStudents()
      } catch (e) {
        toast(e.message, 'err')
      }
    }
    function openAssignModal(studentId, studentName, tutors, student) {
  if (typeof tutors === 'string') tutors = JSON.parse(tutors.replace(/&quot;/g, '"'))
  if (typeof student === 'string') student = JSON.parse(student.replace(/&quot;/g, '"'))
  const prefMode    = student?.preferred_mode || 'online'
  const prefSubjects = (student?.subjects_needed || []).join(', ') || '—'
  const prefLevel   = student?.school_level || '—'
  const prefLocation = student?.home_location || '—'

  document.getElementById('modal-root').innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this)this.remove()">
    <div class="modal">
      <div class="modal-header"><span class="modal-title">Assign Tutor to ${studentName}</span><button class="modal-close" onclick="document.querySelector('.modal-overlay').remove()">✕</button></div>
      <div class="modal-body">
        <div style="background:var(--sky);border-radius:var(--rs);padding:14px;margin-bottom:16px">
          <div style="font-weight:700;color:var(--navy);margin-bottom:8px">📋 Student Preferences</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px">
            <div><span style="color:var(--g400)">Subjects:</span> <strong>${prefSubjects}</strong></div>
            <div><span style="color:var(--g400)">Level:</span> <strong>${prefLevel}</strong></div>
            <div><span style="color:var(--g400)">Mode:</span> <strong>${prefMode}</strong></div>
            <div><span style="color:var(--g400)">Location:</span> <strong>${prefLocation}</strong></div>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Select Tutor *</label>
          <select class="input" id="assign-tutor">
            <option value="">Choose a tutor...</option>
            ${tutors.map(t => `<option value="${t.id}">${t.profiles?.full_name} — ${(t.subjects || []).join(', ')}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Subject *</label>
          <input class="input" id="assign-subject" placeholder="e.g. Mathematics" value="${(student?.subjects_needed||[])[0]||''}"/>
        </div>
        <div class="form-group"><label class="form-label">Mode</label>
          <select class="input" id="assign-mode">
            <option value="online" ${prefMode==='online'?'selected':''}>Online</option>
            <option value="home" ${prefMode==='home'?'selected':''}>Home Visit</option>
            <option value="blended" ${prefMode==='blended'?'selected':''}>Blended</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Notes</label><input class="input" id="assign-notes" placeholder="Optional notes..."/></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="document.querySelector('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="doAssign('${studentId}')">Assign Tutor ✅</button>
      </div>
    </div>
  </div>`
}

    async function doAssign(studentId) {
      const tutorId = document.getElementById('assign-tutor')?.value
      const subject = document.getElementById('assign-subject')?.value?.trim()
      const mode = document.getElementById('assign-mode')?.value
      const notes = document.getElementById('assign-notes')?.value || null
      if (!tutorId || !subject) { toast('Please select a tutor and subject', 'err'); return }
      try {
        await api('/students/admin/assign', { method: 'POST', body: JSON.stringify({ student_id: studentId, tutor_id: tutorId, subject, mode, notes }) })
        toast('Tutor assigned successfully! 🎉')
        document.querySelector('.modal-overlay')?.remove()
        renderAdminStudents()
      } catch (e) { toast(e.message, 'err') }
    }

    // ════════════════════════════════════════════════════════════
    // ADMIN — SESSIONS
    // ════════════════════════════════════════════════════════════
    async function renderAdminSessions() {
      render(dashWrap('admin-sessions', `<div class="loader-center"><div class="spinner"></div></div>`))
      try {
        const tab = State.tab || 'all'
        const sessions = await api('/sessions/admin/all' + (tab !== 'all' ? `?status=${tab}` : ''))
        const [students, tutors] = await Promise.all([api('/students/admin/all'), api('/tutors/admin/all')])
        const approved = tutors.filter(t => t.status === 'approved')
        render(dashWrap('admin-sessions', `
    <div class="page-header">
      <div><h1 class="page-title">Sessions</h1><p class="page-subtitle">${sessions.length} sessions</p></div>
      <button class="btn btn-primary" onclick="openCreateSession(${JSON.stringify(students).replace(/"/g, '&quot;')},${JSON.stringify(approved).replace(/"/g, '&quot;')})">+ Schedule Session</button>
    </div>
    <div class="tabs">
      ${['all', 'scheduled', 'completed', 'cancelled'].map(s => `<button class="tab-btn ${tab === s ? 'active' : ''}" onclick="State.tab='${s}';renderAdminSessions()">${s.charAt(0).toUpperCase() + s.slice(1)}</button>`).join('')}
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Subject</th><th>Student</th><th>Tutor</th><th>Scheduled</th><th>Duration</th><th>Mode</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
          ${sessions.map(s => `
          <tr>
            <td><strong>${s.subject}</strong></td>
            <td>${s.students?.profiles?.full_name || '—'}</td>
            <td>${s.tutors?.profiles?.full_name || '—'}</td>
            <td>${fmt(s.scheduled_at)}</td>
            <td>${s.duration_mins} min</td>
            <td><span class="badge badge-gray">${s.mode}</span></td>
            <td>${statusBadge(s.status)}</td>
            <td>
              ${s.status === 'scheduled' ? `<button class="btn btn-success btn-sm" onclick="updateSession('${s.id}','completed')">Complete</button>` : ''}
              ${s.status === 'scheduled' ? `<button class="btn btn-danger btn-sm" style="margin-left:6px" onclick="updateSession('${s.id}','cancelled')">Cancel</button>` : ''}
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div id="modal-root"></div>
    `))
      } catch (e) { toast(e.message, 'err') }
    }

    function openCreateSession(students, tutors) {
      if (typeof students === 'string') students = JSON.parse(students.replace(/&quot;/g, '"'))
      if (typeof tutors === 'string') tutors = JSON.parse(tutors.replace(/&quot;/g, '"'))
      document.getElementById('modal-root').innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this)this.remove()">
    <div class="modal">
      <div class="modal-header"><span class="modal-title">Schedule Session</span><button class="modal-close" onclick="document.querySelector('.modal-overlay').remove()">✕</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Student *</label>
          <select class="input" id="cs-student"><option value="">Select student...</option>${students.map(s => `<option value="${s.id}">${s.profiles?.full_name}</option>`).join('')}</select></div>
        <div class="form-group"><label class="form-label">Tutor *</label>
          <select class="input" id="cs-tutor"><option value="">Select tutor...</option>${tutors.map(t => `<option value="${t.id}">${t.profiles?.full_name}</option>`).join('')}</select></div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Subject *</label><input class="input" id="cs-subject" placeholder="e.g. Mathematics"/></div>
          <div class="form-group"><label class="form-label">Duration (mins)</label><input class="input" id="cs-dur" type="number" value="60" min="30"/></div>
        </div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Date & Time *</label><input class="input" id="cs-date" type="datetime-local"/></div>
          <div class="form-group"><label class="form-label">Mode</label>
            <select class="input" id="cs-mode"><option value="online">Online</option><option value="home">Home Visit</option></select></div>
        </div>
        <div class="form-group"><label class="form-label">Meeting Link</label><input class="input" id="cs-link" placeholder="https://zoom.us/..."/></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="document.querySelector('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="createSession()">Schedule Session 📅</button>
      </div>
    </div>
  </div>`
    }

    async function createSession() {
      const student = document.getElementById('cs-student')?.value
      const tutor = document.getElementById('cs-tutor')?.value
      const subject = document.getElementById('cs-subject')?.value?.trim()
      const date = document.getElementById('cs-date')?.value
      if (!student || !tutor || !subject || !date) { toast('Please fill all required fields', 'err'); return }
      try {
        await api('/sessions/', {
          method: 'POST', body: JSON.stringify({
            student_id: student, tutor_id: tutor, subject,
            mode: document.getElementById('cs-mode')?.value || 'online',
            scheduled_at: new Date(date).toISOString(),
            duration_mins: parseInt(document.getElementById('cs-dur')?.value) || 60,
            meeting_link: document.getElementById('cs-link')?.value || null,
          })
        })
        toast('Session scheduled! 📅')
        document.querySelector('.modal-overlay')?.remove()
        renderAdminSessions()
      } catch (e) { toast(e.message, 'err') }
    }

    async function updateSession(id, status) {
      try {
        await api(`/sessions/${id}`, { method: 'PATCH', body: JSON.stringify({ status }) })
        toast(`Session marked as ${status}`)
        renderAdminSessions()
      } catch (e) { toast(e.message, 'err') }
    }

    // ════════════════════════════════════════════════════════════
    // ADMIN — PAYMENTS
    // ════════════════════════════════════════════════════════════
    async function markInvoicePaid(invoiceId, studentName, studentId){
  if(!confirm('Mark invoice as paid for ' + studentName + '?')) return
  try{
    await api('/payments/invoices/' + invoiceId + '/paid', {
      method: 'PATCH'
    })
    toast('Invoice marked as paid! ✅')
    renderAdminPayments()
  }catch(e){
    toast(e.message, 'err')
  }
}

    async function renderAdminPayments() {
      render(dashWrap('admin-payments', `<div class="loader-center"><div class="spinner"></div></div>`))
      try {
        const tab = State.tab || 'invoices'
        const [summary, invoices, students] = await Promise.all([
          api('/payments/summary/admin'), api('/payments/invoices/admin'),
          api('/students/admin/all')
        ])
        render(dashWrap('admin-payments', `
    <div class="page-header"><div><h1 class="page-title">Payments</h1><p class="page-subtitle">Revenue & billing management</p></div>
      <button class="btn btn-primary" onclick="openInvoiceModal(${JSON.stringify(students).replace(/"/g, '&quot;')})">+ Create Invoice</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon" style="background:#F0FDF4">💰</div><div><div class="stat-num">$${(summary.total_revenue || 0).toFixed(0)}</div><div class="stat-label">Total Revenue</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#FEF3C7">⏳</div><div><div class="stat-num">$${(summary.pending_fees || 0).toFixed(0)}</div><div class="stat-label">Pending Fees</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#EEF2FF">👨‍🏫</div><div><div class="stat-num">$${(summary.salary_paid || 0).toFixed(0)}</div><div class="stat-label">Salaries Paid</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#F5F3FF">📈</div><div><div class="stat-num">$${(summary.net_income || 0).toFixed(0)}</div><div class="stat-label">Net Income</div></div></div>
    </div>
    <div class="tabs">
      <button class="tab-btn ${tab === 'invoices' ? 'active' : ''}" onclick="State.tab='invoices';renderAdminPayments()">Student Invoices</button>
      <button class="tab-btn ${tab === 'salaries' ? 'active' : ''}" onclick="State.tab='salaries';renderAdminPayments()">Tutor Salaries</button>
    </div>
    ${tab === 'invoices' ? `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Student</th><th>Amount</th><th>Package</th><th>Due Date</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
          ${invoices.map(i => `<tr>
            <td>${i.students?.profiles?.full_name || '—'}</td>
            <td><strong>$${parseFloat(i.amount).toFixed(2)}</strong></td>
            <td>${i.payment_packages?.name || 'Custom'}</td>
            <td>${i.due_date ? fmtShort(i.due_date) : '—'}</td>
            <td>${statusBadge(i.status)}</td>
<td>
  ${i.status === 'pending' || i.status === 'overdue' ? 
    `<button class="btn btn-primary btn-sm" onclick="markInvoicePaid('${i.id}','${i.students?.profiles?.full_name||''}','${i.student_id}')">✅ Mark Paid</button>` : 
    `<span style="color:var(--g400);font-size:13px">—</span>`}
</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : `
    <div class="empty-state"><div class="empty-icon">👨‍🏫</div><div class="empty-title">Tutor Salaries</div><div class="empty-sub">Salary records will appear here</div></div>`}
    <div id="modal-root"></div>
    `))
      } catch (e) { toast(e.message, 'err') }
    }

    function openInvoiceModal(students) {
      if (typeof students === 'string') students = JSON.parse(students.replace(/&quot;/g, '"'))
      document.getElementById('modal-root').innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this)this.remove()">
    <div class="modal">
      <div class="modal-header"><span class="modal-title">Create Invoice</span><button class="modal-close" onclick="document.querySelector('.modal-overlay').remove()">✕</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Student *</label>
          <select class="input" id="inv-student"><option value="">Select student...</option>${students.map(s => `<option value="${s.id}">${s.profiles?.full_name}</option>`).join('')}</select></div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Amount ($) *</label><input class="input" id="inv-amount" type="number" min="0" step="0.01" placeholder="0.00"/></div>
          <div class="form-group"><label class="form-label">Due Date</label><input class="input" id="inv-due" type="date"/></div>
        </div>
        <div class="form-group"><label class="form-label">Notes</label><input class="input" id="inv-notes" placeholder="Invoice description..."/></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="document.querySelector('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="createInvoice()">Create Invoice 💳</button>
      </div>
    </div>
  </div>`
    }

    async function createInvoice() {
      const studentId = document.getElementById('inv-student')?.value
      const amount = parseFloat(document.getElementById('inv-amount')?.value)
      const due = document.getElementById('inv-due')?.value
      const notes = document.getElementById('inv-notes')?.value || null
      if (!studentId || !amount) { toast('Please fill all required fields', 'err'); return }
      try {
        await api('/payments/invoices', { method: 'POST', body: JSON.stringify({ student_id: studentId, amount, due_date: due || null, notes }) })
        toast('Invoice created! 💳')
        document.querySelector('.modal-overlay')?.remove()
        renderAdminPayments()
      } catch (e) { toast(e.message, 'err') }
    }

    // ════════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════════
try {
  const validPages = ['dashboard','sessions','messages','profile','notifications','tutors','admin-tutors','admin-students','admin-sessions','admin-payments']
  if(window.location.hash.startsWith('#report/')){
    const token = window.location.hash.replace('#report/','')
    State.page = 'report/' + token
    renderPage()
  } else if(State.user && getToken()){
    const savedPage = localStorage.getItem('tc_page')
    State.page = validPages.includes(savedPage) ? savedPage : 'dashboard'
    State.tab  = localStorage.getItem('tc_tab')||null
    renderPage()
    setTimeout(loadUnreadCount, 200)
  } else {
    State.user = null
    navigate('landing')
  }
} catch(e) {
  console.error('Boot error:', e)
  navigate('landing')
}

</script>
</body>
</html>
