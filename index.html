  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --navy: #0D1B40;
      --blue: #1A5FFF;
      --blue2: #3B7BFF;
      --sky: #E8F0FF;
      --sky2: #C5D6FF;
      --gold: #F5A623;
      --white: #fff;
      --g50: #F8FAFE;
      --g100: #EEF2FA;
      --g200: #D8E0F0;
      --g400: #8A98B8;
      --g600: #4A5578;
      --g800: #1E2845;
      --green: #10B981;
      --red: #EF4444;
      --orange: #F59E0B;
      --r: 16px;
      --rs: 10px;
      --sh: 0 4px 24px rgba(13, 27, 64, .10);
      --shl: 0 8px 48px rgba(13, 27, 64, .18)
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--g50);
      color: var(--g800);
      overflow-x: hidden
    }

    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: var(--g100)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--sky2);
      border-radius: 3px
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes slideR {
      from {
        opacity: 0;
        transform: translateX(-12px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 11px 22px;
      border-radius: var(--rs);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: all .2s;
      white-space: nowrap;
      text-decoration: none
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 4px 14px rgba(26, 95, 255, .35)
    }

    .btn-primary:hover {
      background: var(--blue2);
      transform: translateY(-1px)
    }

    .btn-secondary {
      background: #fff;
      color: var(--blue);
      border: 2px solid var(--blue)
    }

    .btn-secondary:hover {
      background: var(--sky)
    }

    .btn-ghost {
      background: transparent;
      color: var(--g600);
      border: 2px solid var(--g200)
    }

    .btn-ghost:hover {
      background: var(--g100)
    }

    .btn-gold {
      background: var(--gold);
      color: var(--navy);
      box-shadow: 0 4px 14px rgba(245, 166, 35, .35)
    }

    .btn-danger {
      background: var(--red);
      color: #fff
    }

    .btn-success {
      background: var(--green);
      color: #fff
    }

    .btn-sm {
      padding: 7px 14px;
      font-size: 12px;
      border-radius: 8px
    }

    .btn-lg {
      padding: 15px 34px;
      font-size: 16px;
      border-radius: var(--r)
    }

    .btn-full {
      width: 100%;
      justify-content: center
    }

    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none !important
    }

    /* ── Cards ── */
    .card {
      background: #fff;
      border-radius: var(--r);
      box-shadow: var(--sh)
    }

    .card-hover {
      transition: all .25s;
      cursor: pointer
    }

    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: var(--shl)
    }

    /* ── Forms ── */
    .input {
      width: 100%;
      padding: 11px 15px;
      border: 2px solid var(--g200);
      border-radius: var(--rs);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--g800);
      background: #fff;
      transition: all .2s;
      outline: none
    }

    .input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26, 95, 255, .10)
    }

    .input::placeholder {
      color: var(--g400)
    }

    select.input {
      cursor: pointer
    }

    textarea.input {
      resize: vertical;
      min-height: 90px
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 16px
    }

    .form-label {
      font-weight: 600;
      font-size: 13px;
      color: var(--g600)
    }

    .form-error {
      font-size: 12px;
      color: var(--red);
      margin-top: 3px
    }

    .form-hint {
      font-size: 11px;
      color: var(--g400);
      margin-top: 2px
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700
    }

    .badge-blue {
      background: var(--sky);
      color: var(--blue)
    }

    .badge-green {
      background: #DCFCE7;
      color: #166534
    }

    .badge-orange {
      background: #FEF3C7;
      color: #92400E
    }

    .badge-red {
      background: #FEE2E2;
      color: #991B1B
    }

    .badge-gray {
      background: var(--g100);
      color: var(--g600)
    }

    .badge-navy {
      background: var(--navy);
      color: #fff
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 252px;
      background: var(--navy);
      min-height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      padding: 20px 14px;
      z-index: 50;
      overflow-y: auto;
      transition: transform .3s
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      margin-bottom: 24px;
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      border: none;
      background: none;
      font-family: 'Playfair Display', serif;
      width: 100%;
      text-align: left
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: var(--blue);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0
    }

    .sidebar-section {
      font-size: 10px;
      font-weight: 700;
      color: var(--g400);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 6px 10px 3px;
      margin-top: 10px
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px;
      border-radius: var(--rs);
      cursor: pointer;
      transition: all .2s;
      color: rgba(255, 255, 255, .6);
      font-size: 14px;
      font-weight: 500;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      margin-bottom: 2px
    }

    .sidebar-item:hover {
      background: rgba(255, 255, 255, .08);
      color: #fff
    }

    .sidebar-item.active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 4px 12px rgba(26, 95, 255, .4)
    }

    .sidebar-ic {
      font-size: 17px;
      width: 20px;
      text-align: center
    }

    .sidebar-badge {
      margin-left: auto;
      background: var(--red);
      color: #fff;
      border-radius: 10px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 700
    }

    /* ── Dashboard layout ── */
    .dash-layout {
      display: flex;
      min-height: 100vh
    }

    .dash-main {
      flex: 1;
      margin-left: 252px;
      padding: 32px 28px 60px
    }

    .page-header {
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--navy)
    }

    .page-subtitle {
      color: var(--g600);
      margin-top: 4px;
      font-size: 14px
    }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px
    }

    .stat-card {
      background: #fff;
      border-radius: var(--r);
      padding: 20px;
      box-shadow: var(--sh);
      display: flex;
      align-items: center;
      gap: 14px
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--rs);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0
    }

    .stat-num {
      font-size: 24px;
      font-weight: 800;
      color: var(--navy)
    }

    .stat-label {
      font-size: 12px;
      color: var(--g400);
      font-weight: 600;
      margin-top: 2px
    }

    .stat-delta {
      font-size: 11px;
      margin-top: 3px
    }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--r);
      box-shadow: var(--sh)
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: var(--r);
      overflow: hidden
    }

    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--g400);
      background: var(--g50);
      border-bottom: 1px solid var(--g200)
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--g100);
      font-size: 13px;
      vertical-align: middle
    }

    tr:last-child td {
      border-bottom: none
    }

    tr:hover td {
      background: var(--g50)
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 3px;
      background: var(--g100);
      border-radius: var(--rs);
      padding: 3px;
      width: fit-content;
      margin-bottom: 20px
    }

    .tab-btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      border: none;
      background: none;
      color: var(--g600);
      font-family: 'DM Sans', sans-serif
    }

    .tab-btn.active {
      background: #fff;
      color: var(--blue);
      box-shadow: var(--sh)
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13, 27, 64, .45);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fadeIn .2s
    }

    .modal {
      background: #fff;
      border-radius: var(--r);
      box-shadow: 0 20px 70px rgba(13, 27, 64, .22);
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      animation: fadeUp .3s
    }

    .modal-header {
      padding: 20px 26px;
      border-bottom: 1px solid var(--g100);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--navy)
    }

    .modal-body {
      padding: 24px 26px
    }

    .modal-footer {
      padding: 16px 26px;
      border-top: 1px solid var(--g100);
      display: flex;
      gap: 10px;
      justify-content: flex-end
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--g400);
      padding: 4px;
      border-radius: 6px
    }

    .modal-close:hover {
      background: var(--g100);
      color: var(--g800)
    }

    /* ── Toast ── */
    #toasts {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none
    }

    .toast {
      padding: 12px 18px;
      border-radius: var(--rs);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 260px;
      animation: slideR .3s;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .2);
      pointer-events: all
    }

    .toast-ok {
      background: #065f46;
      color: #fff;
      border-left: 4px solid var(--green)
    }

    .toast-err {
      background: #7f1d1d;
      color: #fff;
      border-left: 4px solid var(--red)
    }

    .toast-info {
      background: #1e3a5f;
      color: #fff;
      border-left: 4px solid var(--blue)
    }

    /* ── Spinner ── */
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--g200);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite
    }

    .loader-center {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px
    }

    /* ── Avatar ── */
    .avatar {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
      background: var(--sky);
      color: var(--blue);
      font-size: 14px
    }

    /* ── Misc ── */
    .stars {
      color: var(--gold);
      font-size: 12px;
      letter-spacing: 1px
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px
    }

    .divider {
      height: 1px;
      background: var(--g100);
      margin: 18px 0
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--g400)
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--g600);
      margin-bottom: 8px
    }

    .empty-sub {
      font-size: 14px
    }

    .progress-bar {
      width: 100%;
      height: 7px;
      background: var(--g100);
      border-radius: 4px;
      overflow: hidden
    }

    .progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 4px;
      transition: width .5s
    }

    .alert-warn {
      background: #FFFBEB;
      border: 1px solid #FDE68A;
      border-radius: var(--r);
      padding: 14px 18px;
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
      font-size: 13px;
      color: #92400E
    }

    /* ── Chat ── */
    .chat-wrap {
      display: flex;
      height: calc(100vh - 180px);
      background: #fff;
      border-radius: var(--r);
      box-shadow: var(--sh);
      overflow: hidden
    }

    .chat-list {
      width: 270px;
      border-right: 1px solid var(--g100);
      overflow-y: auto;
      flex-shrink: 0
    }

    .chat-item {
      padding: 14px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--g100);
      transition: background .2s;
      display: flex;
      align-items: center;
      gap: 11px
    }

    .chat-item:hover,
    .chat-item.active {
      background: var(--sky)
    }

    .chat-item.active {
      border-left: 3px solid var(--blue)
    }

    .chat-messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0
    }

    .msgs-area {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px
    }

    .msg {
      max-width: 68%;
      display: flex;
      flex-direction: column;
      gap: 3px
    }

    .msg.sent {
      align-self: flex-end;
      align-items: flex-end
    }

    .msg.recv {
      align-self: flex-start;
      align-items: flex-start
    }

    .msg-bubble {
      padding: 11px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.55
    }

    .msg.sent .msg-bubble {
      background: var(--blue);
      color: #fff;
      border-bottom-right-radius: 3px
    }

    .msg.recv .msg-bubble {
      background: var(--g100);
      color: var(--g800);
      border-bottom-left-radius: 3px
    }

    .msg-time {
      font-size: 10px;
      color: var(--g400)
    }

    .chat-input-row {
      padding: 14px;
      border-top: 1px solid var(--g100);
      display: flex;
      gap: 10px
    }

    /* ── Landing ── */
    .landing-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      background: #fff;
      box-shadow: 0 2px 12px rgba(13, 27, 64, .08);
      position: sticky;
      top: 0;
      z-index: 40
    }

    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      cursor: pointer;
      border: none;
      background: none;
      font-family: 'Playfair Display', serif
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .hero {
      background: linear-gradient(135deg, var(--navy) 0%, #1A3A80 60%, #1A5FFF 100%);
      padding: 80px 48px;
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 40%, rgba(26, 95, 255, .25) 0%, transparent 70%)
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, .9);
      margin-bottom: 24px;
      backdrop-filter: blur(10px)
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(38px, 6vw, 68px);
      font-weight: 900;
      color: #fff;
      line-height: 1.08;
      max-width: 800px;
      margin-bottom: 22px
    }

    .hero-title span {
      color: var(--gold)
    }

    .hero-sub {
      font-size: 18px;
      color: rgba(255, 255, 255, .75);
      max-width: 560px;
      line-height: 1.65;
      margin-bottom: 36px
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap
    }

    .hero-stats {
      display: flex;

    async function api(path, opts = {}) {
      const token = getToken()
      const h = { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) }
      const r = await fetch(API_URL + path, { ...opts, headers: { ...h, ...(opts.headers || {}) } })
      if (!r.ok) {
        const e = await r.json().catch(() => ({ detail: r.statusText }))
        const msg = typeof e.detail === 'string' ? e.detail : (e.message || JSON.stringify(e.detail) || 'Request failed')
    if(r.status===401 && (msg.toLowerCase().includes('expired') || msg.toLowerCase().includes('invalid token')) && State.user){

          throw new Error(msg)

    function toast(msg, type = 'ok') {
      const icons = { ok: '✅', err: '❌', info: 'ℹ️' }
      const el = document.createElement('div')
      el.className = `toast toast-${type}`
      el.innerHTML = `<span>${icons[type] || '✅'}</span><span>${msg}</span>`

async function submitPost(){

  const content = document.getElementById('post-content')?.value?.trim()
  const category= document.getElementById('post-cat')?.value
  if(!title){ toast('Please add a title','err'); return }
  if(!content){ toast('Please add content','err'); return }
  try{
    await api('/forum/posts', { method:'POST', body: JSON.stringify({ title, content, category }) })
    document.querySelector('.modal-overlay')?.remove()
    toast('Post submitted for review! ✅')
  }catch(e){
    toast(e.message,'err')
  }
}

async function addComment(postId){
  const content = document.getElementById('comment-input')?.value?.trim()
  if(!content){ toast('Please write a comment','err'); return }
  try{
    await api(`/forum/posts/${postId}/comments`, { method:'POST', body: JSON.stringify({ content }) })
    toast('Comment added! ✅')
    openPost(postId)
  }catch(e){
    toast(e.message,'err')
  }
}

async function likePost(postId){
  try{
    const res = await api(`/forum/posts/${postId}/like`, { method:'POST' })
    const btn = document.querySelector(`button[data-like="${postId}"]`)
    if(btn){
      const current = parseInt(btn.getAttribute('data-count')||'0')
      const newCount = res.liked ? current + 1 : current - 1
      btn.setAttribute('data-count', newCount)
      btn.textContent = `❤️ ${newCount}`
      btn.style.color = res.liked ? 'var(--red)' : 'var(--g400)'
    }
  }catch(e){
    toast(e.message,'err')
  }
}

async function deletePost(postId, title){
  if(!confirm('Delete post "' + title + '"? This cannot be undone.')) return
  try{
    await api(`/forum/admin/posts/${postId}`, { method:'DELETE' })
    toast('Post deleted! ✅')
    renderForum()
  }catch(e){
    toast(e.message,'err')
  }
}
async function pinPost(postId){

    toast(e.message,'err')
  }
}

async function insertNewsImage(input){
  const file = input.files[0]
  if(!file) return
  if(file.size > 5*1024*1024){ toast('Image must be under 5MB','err'); return }
  toast('Uploading image...')
  const form = new FormData()
  form.append('file', file)
  
  console.log('Token:', getToken()?.slice(0,20))
  try{
    const res = await fetch(API_URL + '/news/upload-image', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + getToken() },
      body: form
    })
    
    const data = await res.json()
  
    if(!res.ok) throw new Error(data.detail||'Upload failed')
   
    const editor = document.getElementById('news-editor')
    if(editor){
      const img = document.createElement('img')
      img.src = data.url
      img.style.cssText = 'max-width:100%;height:auto;border-radius:8px;margin:8px 0;display:block'
      editor.appendChild(img)
      toast('Image uploaded! ✅')
    } else {
      console.log('Editor not found!')
    }
  }catch(e){

  
    toast(e.message,'err')
  }
  input.value = ''
}

function resizeSelectedImg(width, align=null){
  const img = document.querySelector('#news-editor img.selected')
  if(!img) return
  img.style.width = width
  img.style.maxWidth = '100%'
  if(align){
    img.style.display = 'block'
    img.style.marginLeft = align === 'center' ? 'auto' : align === 'right' ? 'auto' : '0'
    img.style.marginRight = align === 'center' ? 'auto' : align === 'right' ? '0' : 'auto'
    img.style.float = align === 'left' ? 'left' : align === 'right' ? 'right' : 'none'
    if(align === 'center') img.style.float = 'none'
  }
}

async function submitNews(postId){
  const title      = document.getElementById('news-title')?.value?.trim()
  const content = document.getElementById('news-editor')?.innerHTML?.trim()
  const category   = document.getElementById('news-cat')?.value
  const image_url  = document.getElementById('news-image')?.value?.trim()||null
  const source_name= document.getElementById('news-source-name')?.value?.trim()||null
  const source_url = document.getElementById('news-source-url')?.value?.trim()||null
  const is_featured= document.getElementById('news-featured')?.checked||false
  if(!title){ toast('Please add a title','err'); return }
  if(!content){ toast('Please add content','err'); return }
  try{
    if(postId){
      await api(`/news/${postId}`, { method:'PATCH', body: JSON.stringify({ title, content, category, image_url, source_name, source_url, is_featured }) })
      toast('Post updated! ✅')
    } else {
      await api('/news/', { method:'POST', body: JSON.stringify({ title, content, category, image_url, source_name, source_url, is_featured }) })
      toast('Post published! ✅')
    }
    document.querySelector('.modal-overlay')?.remove()
    renderNews()
  }catch(e){
    toast(e.message,'err')
  }
}

async function deleteNews(postId){
  if(!confirm('Delete this post?')) return
  try{
    await api(`/news/${postId}`, { method:'DELETE' })
    toast('Post deleted! ✅')
    renderNews()
  }catch(e){
    toast(e.message,'err')
  }
}
function openCropModal(){
  const img = document.querySelector('#news-editor img.selected')
  if(!img) return
  
  const src = img.src
  
  // Create crop modal
  const modal = document.createElement('div')
  modal.id = 'crop-modal'
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:99999;display:flex;align-items:center;justify-content:center'
  modal.innerHTML = `
    <div style="background:#fff;border-radius:16px;padding:24px;max-width:700px;width:90%;max-height:90vh;overflow:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="font-size:16px;font-weight:700;color:var(--navy)">✂️ Crop Image</h3>
        <button onclick="closeCropModal()" style="background:none;border:none;font-size:20px;cursor:pointer">✕</button>
      </div>
      <div style="max-height:400px;overflow:hidden">
        <img id="crop-img" src="${src}" style="max-width:100%"/>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">
        <button onclick="setCropRatio(16/9)" class="btn btn-ghost btn-sm">16:9</button>
        <button onclick="setCropRatio(4/3)" class="btn btn-ghost btn-sm">4:3</button>
        <button onclick="setCropRatio(1)" class="btn btn-ghost btn-sm">1:1</button>
        <button onclick="setCropRatio(NaN)" class="btn btn-ghost btn-sm">Free</button>
      </div>
      <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
        <button onclick="closeCropModal()" class="btn btn-ghost">Cancel</button>
        <button onclick="applyCrop()" class="btn btn-primary">Apply Crop ✅</button>
      </div>
    </div>
  `
  document.body.appendChild(modal)
  
  // Initialize cropper
  const cropImg = document.getElementById('crop-img')
  window._cropper = new Cropper(cropImg, {
    viewMode: 1,
    autoCropArea: 1,
  })
}

function setCropRatio(ratio){
  if(window._cropper) window._cropper.setAspectRatio(ratio)
}

function applyCrop(){
  const img = document.querySelector('#news-editor img.selected')
  if(!img || !window._cropper) return
  
  const canvas = window._cropper.getCroppedCanvas()
  const croppedUrl = canvas.toDataURL('image/jpeg', 0.9)
  
  // Upload cropped image to server
  canvas.toBlob(async (blob)=>{
    const form = new FormData()
    form.append('file', blob, 'cropped.jpg')
    try{
      const res = await fetch(API_URL + '/news/upload-image', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + getToken() },
        body: form
      })
      const data = await res.json()
      if(res.ok){
        img.src = data.url
        img.style.width = ''
        toast('Image cropped and uploaded! ✅')
      } else {
        // Fallback to base64 if upload fails
        img.src = croppedUrl
      }
    }catch(e){
      img.src = croppedUrl
    }
    closeCropModal()
  }, 'image/jpeg', 0.9)
}

function closeCropModal(){
  if(window._cropper){ window._cropper.destroy(); window._cropper = null }
  document.getElementById('crop-modal')?.remove()
}

async function submitResetPassword(token){
  const pw1 = document.getElementById('new-pw-1')?.value
  const pw2 = document.getElementById('new-pw-2')?.value
  const err = document.getElementById('reset-err')
  if(!pw1 || pw1.length < 6){ err.style.display='block'; err.textContent='Password must be at least 6 characters'; return }
  if(pw1 !== pw2){ err.style.display='block'; err.textContent='Passwords do not match'; return }
  try{
    await fetch(API_URL + '/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: pw1 })
    })
    render(`
    <div style="min-height:100vh;background:linear-gradient(135deg,#1e3a8a,#2563eb);display:flex;align-items:center;justify-content:center;padding:20px">

      const el = document.getElementById(id)
      if(!el) return
      const start = performance.now()
      function step(now){
        const progress = Math.min((now - start) / duration, 1)
        const ease = 1 - Math.pow(1 - progress, 3)
        const val = isDecimal ? (ease * target).toFixed(1) : Math.round(ease * target)
        el.textContent = val + suffix
        if(progress < 1) requestAnimationFrame(step)
      }
      requestAnimationFrame(step)
    }

    async function doForgotPassword() {
      const email = document.getElementById('fp-email')?.value?.trim()
      const btn = document.getElementById('fp-btn')
      const msg = document.getElementById('fp-msg')
      if (!email) {
        msg.style.display = 'block'
        msg.style.background = '#fee2e2'
        msg.style.color = '#dc2626'
        msg.textContent = 'Please enter your email address'
        return
      }
      btn.disabled = true
      btn.textContent = 'Sending...'
      try {
        await api('/auth/forgot-password', { method: 'POST', body: JSON.stringify({ email }) })
        msg.style.display = 'block'
        msg.style.background = '#dcfce7'
        msg.style.color = '#16a34a'
        msg.textContent = '✅ Reset link sent! Check your email inbox.'
        btn.textContent = 'Sent!'
      } catch (e) {
        msg.style.display = 'block'
        msg.style.background = '#fee2e2'
        msg.style.color = '#dc2626'
        msg.textContent = 'Failed to send reset email. Try again.'
        btn.disabled = false
        btn.textContent = 'Send Reset Link'
      }
    }
    async function doLogin() {
      const email = document.getElementById('l-email')?.value?.trim()
      const pw = document.getElementById('l-pw')?.value
      const btn = document.getElementById('login-btn')
      const err = document.getElementById('login-err')
      if (!email || !pw) { showErr(err, 'Please enter email and password'); return }
      btn.disabled = true; btn.textContent = 'Signing in...'
      try {
        const data = await api('/auth/login', { method: 'POST', body: JSON.stringify({ email, password: pw }) })
        setAuth(data)
        toast(`Welcome back, ${data.user.full_name}! 👋`)
        navigate('dashboard')
     } catch (e) {
        let msg = e.message
        if(msg.includes('valid email') || msg.includes('email') || msg.includes('EmailStr')) msg = 'Please enter a valid email address (e.g. name@example.com)'
        if(msg.includes('already registered') || msg.includes('duplicate')) msg = 'This email is already registered. Please sign in instead.'
        if(msg.includes('password')) msg = 'Password must be at least 6 characters'
        showErr(err, msg)
        btn.disabled = false; btn.textContent = 'Sign In'
      }
    }

    function showErr(el, msg) { if (el) { el.textContent = msg; el.style.display = 'block' } }

    async function doRegister() {
      const role = window._regRole
      const btn = document.getElementById('reg-btn')
      const err = document.getElementById('reg-err')
      const name = document.getElementById('r-name')?.value?.trim()
      const email = document.getElementById('r-email')?.value?.trim()
      const pw = document.getElementById('r-pw')?.value
      if (!name || !email || !pw) { showErr(err, 'Name, email and password are required'); return }
const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
if (!emailRegex.test(email)) { showErr(err, 'Please enter a valid email address (e.g. name@example.com)'); return }
if (pw.length < 6) { showErr(err, 'Password must be at least 6 characters'); return }

      if (role === 'tutor') {
        const cvFile = document.getElementById('r-cv')?.files[0]
        if (!cvFile) { showErr(err, 'Please upload your CV'); return }
      }

      btn.disabled = true; btn.textContent = 'Creating account...'
      try {
        let body, path
        if (role === 'student') {
          const level = document.getElementById('r-level')?.value
          if (!level) { showErr(err, 'Please select a school level'); btn.disabled = false; btn.textContent = 'Create Student Account →'; return }
          const locationS = document.getElementById('r-location-s')?.value
if (!locationS) { showErr(err, 'Please select your district'); btn.disabled = false; btn.textContent = 'Create Student Account →'; return }
          body = {
            full_name: name, email, password: pw,
            phone: document.getElementById('r-phone')?.value || null,
            school_level: level,
            subjects_needed: document.getElementById('r-subjects')?.value?.split(',').map(s => s.trim()).filter(Boolean) || [],
            preferred_mode: document.getElementById('r-mode')?.value || 'online',
            home_location: document.getElementById('r-location-s')?.value || null,
            parent_name: document.getElementById('r-parent')?.value||null,
            parent_phone: document.getElementById('r-parent-phone')?.value||null ,
            category: document.getElementById('r-student-category')?.value || 'academic',}
            path = '/auth/register/student'
            
        } else {
          const qual = document.getElementById('r-qual')?.value?.trim()
          const subs = document.getElementById('r-subjects')?.value?.split(',').map(s => s.trim()).filter(Boolean) || []
          const lvls = document.getElementById('r-levels')?.value?.split(',').map(s => s.trim()).filter(Boolean) || []
          const exp = parseInt(document.getElementById('r-exp')?.value) || 0
          const locationT = document.getElementById('r-location')?.value
if (!qual || !subs.length || !lvls.length) { showErr(err, 'Qualification, subjects and levels are required'); btn.disabled = false; btn.textContent = 'Submit Application →'; return }
if (!locationT) { showErr(err, 'Please select your district'); btn.disabled = false; btn.textContent = 'Submit Application →'; return }
          body = {
            full_name: name, email, password: pw,
            phone: document.getElementById('r-phone')?.value || null,
            qualification: qual, subjects: subs, levels: lvls,
            teaching_modes: document.getElementById('r-mode')?.value?.split(',') || ['online'],
            experience_years: exp,
            location: document.getElementById('r-location')?.value || null,
            bio: document.getElementById('r-bio')?.value || null,
            category: document.getElementById('r-category')?.value || 'academic'
          }
          path = '/auth/register/tutor'
        }

        await api(path, { method: 'POST', body: JSON.stringify(body) })

        // Upload CV after successful tutor registration
        if (role === 'tutor') {
          btn.textContent = 'Uploading CV...'
          const cvFile = document.getElementById('r-cv')?.files[0]
          const certFiles = document.getElementById('r-cert')?.files
          const formData = new FormData()
          formData.append('cv', cvFile)
          if (certFiles?.length) {
            for (const f of certFiles) formData.append('certificates', f)
          }
          try {
            const token = getToken()
            await fetch(API_URL + '/tutors/upload-docs', {
              method: 'POST',
              headers: { Authorization: `Bearer ${token}` },
              body: formData
            })
          } catch (e) {
            toast('Account created but CV upload failed. Please upload from dashboard.', 'err')
          }
        }

        toast(role === 'tutor' ? 'Application submitted! Check your email to verify your account ✅' : 'Account created! Please check your email to verify your account 🎉')
        navigate('login')
      } catch (e) {
        showErr(err, e.message)
        btn.disabled = false
        btn.textContent = role === 'student' ? 'Create Student Account →' : 'Submit Application →'
      }
    }

    async function uploadTutorDocs() {
      const cvFile = document.getElementById('cv-upload')?.files[0]
      if (!cvFile) { toast('Please select a CV file', 'err'); return }

      const formData = new FormData()
      formData.append('cv', cvFile)

      const certFiles = document.getElementById('cert-upload')?.files
      if (certFiles?.length) {
        for (const f of certFiles) formData.append('certificates', f)
      }

      try {
        const token = getToken()
        const r = await fetch(API_URL + '/tutors/upload-docs', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
          body: formData
        })
        if (!r.ok) throw new Error('Upload failed')
        toast('Documents uploaded successfully! ✅')
        renderTutorDash()
      } catch (e) {
        console.error('Dashboard error:', e)
        alert('Error: ' + e.message + '\n' + e.stack)
        render(dashWrap('dashboard', `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load dashboard</div><button class="btn btn-primary" onclick="navigate('dashboard')">Retry</button></div>`))
      }
    }
    function togglePaymentDetails(){
  const method = document.getElementById('t-pay-method')?.value
  const label  = document.getElementById('pay-details-label')
  if(!label) return
  if(method === 'bank'){
    label.textContent = 'Bank Account Number & Bank Name'
  } else if(method === 'mtn_momo'){
    label.textContent = 'MTN Mobile Money Number'
  } else if(method === 'airtel'){
    label.textContent = 'Airtel Money Number'
  } else {
    label.textContent = 'Account Details'
  }
}

async function savePaymentPreference(){
  const method  = document.getElementById('t-pay-method')?.value
  const details = document.getElementById('t-pay-details')?.value?.trim()
  if(!method){ toast('Please select a payment method','err'); return }
  if(!details){ toast('Please enter your account details','err'); return }
  try{
    await api('/tutors/me/payment-preference', {
      method: 'PATCH',
      body: JSON.stringify({ payment_method: method, payment_details: details })
    })
    toast('Payment preference saved! ✅')
  }catch(e){
    toast(e.message,'err')
  }
}

async function submitProgress(sessionId){
  const marks       = document.getElementById('prog-marks')?.value
  const feedback    = document.getElementById('prog-feedback')?.value?.trim()
  const strengths   = document.getElementById('prog-strengths')?.value?.trim()
  const improvements = document.getElementById('prog-improvements')?.value?.trim()

  if(!feedback){ toast('Please add feedback','err'); return }

  try{
    await api('/progress', {
      method: 'POST',
      body: JSON.stringify({
        session_id:   sessionId,
        marks:        marks ? parseInt(marks) : null,
        feedback:     feedback,
        strengths:    strengths||null,
        improvements: improvements||null,
      })
    })
    document.querySelector('.modal-overlay')?.remove()
    toast('Feedback submitted! ✅')
    renderSessions()
  }catch(e){
    toast(e.message,'err')
  }
}

    async function uploadAvatar(input){
  const file = input.files[0]
  if(!file) return
  if(file.size > 2 * 1024 * 1024){ toast('Image must be under 2MB','err'); return }
  const form = new FormData()
  form.append('file', file)
  try{
    toast('Uploading...')
    const res = await fetch(API_URL + '/tutors/upload-avatar', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + getToken() },
      body: form
    })
    const data = await res.json()
    if(!res.ok) throw new Error(data.detail||'Upload failed')
    toast('Profile photo updated! ✅')
    renderProfile()
  }catch(e){
    toast(e.message,'err')
  }
}

    async function doAssign(studentId) {
      const tutorId = document.getElementById('assign-tutor')?.value
      const subject = document.getElementById('assign-subject')?.value?.trim()
      const mode = document.getElementById('assign-mode')?.value
      const notes = document.getElementById('assign-notes')?.value || null
      if (!tutorId || !subject) { toast('Please select a tutor and subject', 'err'); return }

        await api('/students/admin/assign', { method: 'POST', body: JSON.stringify({ student_id: studentId, tutor_id: tutorId, subject, mode, notes }) })

        document.querySelector('.modal-overlay')?.remove()
        renderAdminStudents()
      } catch (e) { toast(e.message, 'err') }
    }

    async function createSession() {

    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon" style="background:#F0FDF4">💰</div><div><div class="stat-num">$${(summary.total_revenue || 0).toFixed(0)}</div><div class="stat-label">Total Revenue</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#FEF3C7">⏳</div><div><div class="stat-num">$${(summary.pending_fees || 0).toFixed(0)}</div><div class="stat-label">Pending Fees</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#EEF2FF">👨‍🏫</div><div><div class="stat-num">$${(summary.salary_paid || 0).toFixed(0)}</div><div class="stat-label">Salaries Paid</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#F5F3FF">📈</div><div><div class="stat-num">$${(summary.net_income || 0).toFixed(0)}</div><div class="stat-label">Net Income</div></div></div>
    </div>
    <div class="tabs">
      <button class="tab-btn ${tab === 'invoices' ? 'active' : ''}" onclick="State.tab='invoices';renderAdminPayments()">Student Invoices</button>
      <button class="tab-btn ${tab === 'salaries' ? 'active' : ''}" onclick="State.tab='salaries';renderAdminPayments()">Tutor Salaries</button>
    </div>
    ${tab === 'invoices' ? `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Student</th><th>Amount</th><th>Package</th><th>Due Date</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
          ${invoices.map(i => `<tr>
            <td>${i.students?.profiles?.full_name || '—'}</td>
            <td><strong>$${parseFloat(i.amount).toFixed(2)}</strong></td>
            <td>${i.payment_packages?.name || 'Custom'}</td>
            <td>${i.due_date ? fmtShort(i.due_date) : '—'}</td>
            <td>${statusBadge(i.status)}</td>
<td>
  ${i.status === 'pending' || i.status === 'overdue' ? 
    `<button class="btn btn-primary btn-sm" onclick="markInvoicePaid('${i.id}','${i.students?.profiles?.full_name||''}','${i.student_id}')">✅ Mark Paid</button>` : 
    `<span style="color:var(--g400);font-size:13px">—</span>`}
</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : `
    <div class="empty-state"><div class="empty-icon">👨‍🏫</div><div class="empty-title">Tutor Salaries</div><div class="empty-sub">Salary records will appear here</div></div>`}
    <div id="modal-root"></div>
    `))
      } catch (e) { toast(e.message, 'err') }
    }

    function openInvoiceModal(students) {
      if (typeof students === 'string') students = JSON.parse(students.replace(/&quot;/g, '"'))
      document.getElementById('modal-root').innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this)this.remove()">
    <div class="modal">
      <div class="modal-header"><span class="modal-title">Create Invoice</span><button class="modal-close" onclick="document.querySelector('.modal-overlay').remove()">✕</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Student *</label>
          <select class="input" id="inv-student"><option value="">Select student...</option>${students.map(s => `<option value="${s.id}">${s.profiles?.full_name}</option>`).join('')}</select></div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Amount ($) *</label><input class="input" id="inv-amount" type="number" min="0" step="0.01" placeholder="0.00"/></div>
          <div class="form-group"><label class="form-label">Due Date</label><input class="input" id="inv-due" type="date"/></div>
        </div>
        <div class="form-group"><label class="form-label">Notes</label><input class="input" id="inv-notes" placeholder="Invoice description..."/></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="document.querySelector('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="createInvoice()">Create Invoice 💳</button>
      </div>
    </div>
  </div>`
    }

    async function createInvoice() {
      const studentId = document.getElementById('inv-student')?.value
      const amount = parseFloat(document.getElementById('inv-amount')?.value)
      const due = document.getElementById('inv-due')?.value
      const notes = document.getElementById('inv-notes')?.value || null
      if (!studentId || !amount) { toast('Please fill all required fields', 'err'); return }
      try {
        await api('/payments/invoices', { method: 'POST', body: JSON.stringify({ student_id: studentId, amount, due_date: due || null, notes }) })
        toast('Invoice created! 💳')
        document.querySelector('.modal-overlay')?.remove()
        renderAdminPayments()
      } catch (e) { toast(e.message, 'err') }
    }

    // ════════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════════
try {
  const validPages = ['dashboard','sessions','messages','profile','notifications','tutors','admin-tutors','admin-students','admin-sessions','admin-payments','forum','news']
  if(window.location.hash.startsWith('#verify/')){
    const token = window.location.hash.replace('#verify/','')
    State.page = 'verify/' + token
    renderPage()
    
  } else if(window.location.hash.startsWith('#reset/')){
    const token = window.location.hash.replace('#reset/','')
    State.page = 'reset/' + token
    renderPage()
  } else if(window.location.hash.startsWith('#report/')){
    const token = window.location.hash.replace('#report/','')
    State.page = 'report/' + token
    renderPage()
  } else if(State.user && getToken()){
    const savedPage = localStorage.getItem('tc_page')
    State.page = validPages.includes(savedPage) ? savedPage : 'dashboard'
    State.tab  = localStorage.getItem('tc_tab')||null
    renderPage()
    setTimeout(loadUnreadCount, 200)
  } else {
    State.user = null
    navigate('landing')
  }
} catch(e) {
  console.error('Boot error:', e)
  navigate('landing')
}
</script>
</body>
</html>
